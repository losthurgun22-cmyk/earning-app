<button class="login-btn" onclick="location.href='https://tirangagames.com/#/register?invitationCode=8750201938'">LOG IN</button>

<div class="game-area">
    <div class="timer-box">
        <span>WinGo 30sec</span>
        <span id="timer" style="color: #ffcc00; font-weight: bold;">00:30</span>
    </div>
    
    <div class="color-btns">
        <button class="c-btn green" onclick="bet('Green')">Green</button>
        <button class="c-btn violet" onclick="bet('Violet')">Violet</button>
        <button class="c-btn red" onclick="bet('Red')">Red</button>
    </div>

    <div class="num-grid">
        <div class="num-ball" style="color: #9c27b0;">0</div>
        <div class="num-ball" style="color: #138808;">1</div>
        <div class="num-ball" style="color: #ff9933;">2</div>
        <div class="num-ball" style="color: #138808;">3</div>
        <div class="num-ball" style="color: #ff9933;">4</div>
        <div class="num-ball" style="color: #138808;">5</div>
        <div class="num-ball" style="color: #ff9933;">6</div>
        <div class="num-ball" style="color: #138808;">7</div>
        <div class="num-ball" style="color: #ff9933;">8</div>
        <div class="num-ball" style="color: #138808;">9</div>
    </div>
</div>

<script>
    // Asli jaisa 30 second ka timer chalane ke liye
    let timeLeft = 30;
    const timerDisplay = document.getElementById('timer');

    setInterval(() => {
        if(timeLeft <= 0) {
            timeLeft = 30; // Reset timer
        } else {
            timeLeft--;
        }
        let secs = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        timerDisplay.innerHTML = '00:' + secs;
    }, 1000);

    function bet(color) {
        alert(color + " par bet lagane ke liye Login karein!");
        location.href = 'https://tirangagames.com/';
    }
</script>
