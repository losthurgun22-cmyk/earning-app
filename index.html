<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiranga Login - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #06122e; --card-blue: #152b5d; --gold: #ffcc00; --bright-blue: #4facfe; --input-bg: #1a2a4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; }

        /* Login Screen Style (As per 1000015819.jpg) */
        #login-page { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .login-header { width: 100%; padding: 20px; text-align: left; font-size: 24px; font-weight: bold; }
        .login-container { width: 90%; margin-top: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #8a9fc7; font-size: 14px; }
        .input-field { width: 100%; background: var(--input-bg); border: 1px solid #2a4175; padding: 15px; border-radius: 10px; color: white; outline: none; }
        .login-btn { width: 100%; background: linear-gradient(to right, #3a61a8, #4facfe); border: none; padding: 15px; border-radius: 30px; color: white; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .reg-link { margin-top: 20px; text-align: center; font-size: 14px; color: #8a9fc7; }
        .reg-link span { color: var(--gold); font-weight: bold; cursor: pointer; }

        /* Main App Interface (Initially Hidden) */
        #main-app { display: none; padding-bottom: 100px; }
        .header { background: var(--card-blue); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #2a4175; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .game-card { background: var(--card-blue); border-radius: 12px; height: 110px; border: 1px solid #2a4175; background-size: cover; cursor: pointer; }
        
        /* Fixed Images */
        .w-wingo { background-image: url('https://i.imgur.com/8N4Nn6Y.png'); }
        .w-slots { background-image: url('https://i.imgur.com/R3pZf6l.png'); }

        /* Spin Wheel */
        .spin-float { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); text-align: center; }
        .wheel-img { width: 80px; height: 80px; background: url('https://i.imgur.com/8S9Z8fL.png') no-repeat center; background-size: contain; animation: spin 5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Popup */
        #verifyPopup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .popup-card { background: var(--card-blue); width: 85%; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-header">Log in</div>
        <div class="login-container">
            <div class="input-group">
                <label><i class="fa-solid fa-mobile-screen"></i> Phone Number</label>
                <input type="text" class="input-field" placeholder="Please enter the phone number">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" class="input-field" placeholder="Please enter the password">
            </div>
            <button class="login-btn" onclick="fakeLogin()">Log in</button>
            <div class="reg-link">Don't have an account? <span onclick="openPopup()">Register</span></div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="font-weight:900; font-style:italic;">Tiranga</div>
            <div style="font-size:12px;">🇮🇳 English</div>
        </div>
        <div style="width:94%; margin:15px auto; border-radius:12px; overflow:hidden;">
            <img src="https://i.imgur.com/8N4Nn6Y.png" style="width:100%;">
        </div>
        <div class="game-grid">
            <div class="game-card w-wingo" onclick="openPopup()"></div>
            <div class="game-card w-slots" onclick="openPopup()"></div>
        </div>
        <div class="spin-float" onclick="openPopup()">
            <div class="wheel-img"></div>
            <div style="background:#ff4757; padding:2px 10px; border-radius:10px; font-size:12px; margin-top:-10px; position:relative;">Get ₹500</div>
        </div>
    </div>

    <div id="verifyPopup">
        <div class="popup-card">
            <h3 style="color:var(--gold);">Attention!</h3>
            <p style="margin:15px 0; font-size:14px;">Verify pending. Activation ke liye ₹100 deposit karein.</p>
            <div style="background:#06122e; padding:10px; border:1px dashed var(--bright-blue); color:var(--gold); font-weight:bold;">
                UPI: 8750201938@fam
            </div>
            <button style="background:#28a745; color:white; border:none; padding:12px; border-radius:25px; width:100%; margin-top:15px; font-weight:bold;" onclick="window.location.href='https://wa.me/918750201938'">Verify Now</button>
            <p style="margin-top:10px; color:#8a9fc7; font-size:12px; cursor:pointer;" onclick="closePopup()">[ Close ]</p>
        </div>
    </div>

    <script>
        function fakeLogin() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
        function openPopup() { document.getElementById('verifyPopup').style.display = 'flex'; }
        function closePopup() { document.getElementById('verifyPopup').style.display = 'none'; }
    </script>

</body>
</html>
