<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tiranga Games Official Login Page.">
    <meta name="keywords" content="Tiranga, Tiranga Login, Tiranga Games">
    <title>Tiranga Games Official</title>
    <style>
        body { background: #06122e; color: white; font-family: Arial; text-align: center; padding: 50px 20px; }
        .header { color: #ffcc00; font-size: 28px; font-weight: bold; margin-bottom: 30px; }
        .input-box { background: #1a2a4d; border: 1px solid #2a4175; padding: 15px; border-radius: 10px; width: 85%; color: white; margin-bottom: 20px; outline: none; }
        .login-btn { width: 90%; background: linear-gradient(to right, #ff9933, #ffffff, #138808); border: none; padding: 16px; border-radius: 30px; color: #000; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">TIRANGA GAMES</div>
    <h2>Log in</h2>
    <input type="text" class="input-box" placeholder="Phone Number">
    <input type="password" class="input-box" placeholder="Password">
    <br>
    <button class="login-btn">LOG IN</button>
</body>
</html>
