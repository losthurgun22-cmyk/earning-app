<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #06122e; --card: #152b5d; --gold: #ffcc00; --input: #1a2a4d; }
        body { background: var(--bg); color: white; margin: 0; font-family: Arial; }
        #login-page { padding: 30px 20px; }
        .input-box { background: var(--input); border: 1px solid #2a4175; padding: 15px; border-radius: 10px; width: 100%; color: white; margin-bottom: 20px; outline: none; }
        .login-btn { width: 100%; background: linear-gradient(to right, #3a61a8, #4facfe); border: none; padding: 16px; border-radius: 30px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        #main-app { display: none; }
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #2a4175; font-weight: 900; text-align: center; font-size: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .game-card { background: var(--card); border-radius: 12px; height: 110px; border: 1px solid #2a4175; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 10px; font-weight: bold; }
        #verifyPopup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .popup-card { background: var(--card); width: 85%; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div id="login-page">
        <h2 style="margin-bottom:30px;">Log in</h2>
        <p style="color:#8a9fc7; font-size:14px; margin-bottom:8px;">Phone Number</p>
        <input type="text" class="input-box" placeholder="Please enter the phone number">
        <p style="color:#8a9fc7; font-size:14px; margin-bottom:8px;">Password</p>
        <input type="password" class="input-box" placeholder="Please enter the password">
        <button class="login-btn" onclick="doLogin()">Log in</button>
    </div>
    <div id="main-app">
        <div class="header">Tiranga Official</div>
        <div class="game-grid">
            <div class="game-card" style="background-image:url('https://i.imgur.com/8N4Nn6Y.png')" onclick="showPop()">Wingo</div>
            <div class="game-card" style="background-image:url('https://i.imgur.com/R3pZf6l.png')" onclick="showPop()">Slots</div>
        </div>
        <div style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); text-align: center;" onclick="showPop()">
            <img src="https://i.imgur.com/8S9Z8fL.png" style="width: 80px; animation: rotation 5s linear infinite;">
            <div style="background:#ff4757; color:white; padding:2px 10px; border-radius:10px; font-size:12px; margin-top:-10px; position:relative;">Get ₹500</div>
        </div>
    </div>
    <div id="verifyPopup">
        <div class="popup-card">
            <h3 style="color:var(--gold);">Verify Pending</h3>
            <p>Aapka account verify nahi hai. Activation ke liye ₹100 deposit karein.</p>
            <p style="font-weight:bold; color:var(--gold); border: 1px dashed #4facfe; padding: 10px;">UPI: 8750201938@fam</p>
            <button style="background:#28a745; color:white; border:none; padding:12px; border-radius:25px; width:100%; margin-top:15px; font-weight:bold;" onclick="window.location.href='https://wa.me/918750201938'">WhatsApp Verify</button>
            <p onclick="document.getElementById('verifyPopup').style.display='none'" style="margin-top:10px; font-size:12px; color:#8a9fc7;">[ Close ]</p>
        </div>
    </div>
    <script>
        function doLogin() { document.getElementById('login-page').style.display='none'; document.getElementById('main-app').style.display='block'; }
        function showPop() { document.getElementById('verifyPopup').style.display='flex'; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </script>
</body>
</html>
